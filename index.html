<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Levant &amp; Gulf Brief</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%B0</text></svg>">
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #f59e0b;
    --accent-glow: rgba(245, 158, 11, 0.18);
    --border: #334155;
    --today-bg: #1c2742;
    --today-border: #f59e0b;
    --critical: #ef4444;
    --critical-tint: rgba(239, 68, 68, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 18px 80px;
  }
  header {
    padding: 14px 0 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: -0.5px;
  }
  .meta {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
  }
  .today-card {
    background: var(--today-bg);
    border: 2px solid var(--today-border);
    border-radius: 16px;
    padding: 18px 18px;
    margin-bottom: 26px;
    box-shadow: 0 0 24px var(--accent-glow);
    position: relative;
  }
  .today-badge {
    position: absolute;
    top: -10px;
    left: 16px;
    background: var(--accent);
    color: #0f172a;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 9px;
    border-radius: 999px;
    text-transform: uppercase;
  }
  .today-card h2 {
    font-size: 20px;
    font-weight: 700;
    margin-top: 4px;
    margin-bottom: 6px;
  }
  .today-card .day-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .today-card .open-link {
    display: inline-block;
    margin-top: 4px;
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .today-card .open-link:hover { text-decoration: underline; }
  .today-content {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  section.country {
    margin-bottom: 22px;
  }
  section.country h3 {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }
  .story {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    position: relative;
  }
  .story[data-priority="high"] {
    border-left: 4px solid var(--critical);
    background: linear-gradient(to right, var(--critical-tint), var(--surface) 60%);
  }
  .priority-flag {
    display: inline-block;
    background: var(--critical);
    color: #fff;
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.6px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 6px;
    text-transform: uppercase;
    vertical-align: 1px;
  }
  .story-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .story-meta { flex: 1; min-width: 0; }
  .story .date {
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 4px;
    display: block;
  }
  .story .lang {
    display: inline-block;
    font-size: 9.5px;
    letter-spacing: 0.5px;
    background: var(--surface-2);
    color: var(--muted);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    text-transform: uppercase;
  }
  .story h4 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 5px;
    line-height: 1.35;
  }
  .story p {
    font-size: 14px;
    color: #cbd5e1;
  }
  .story a.src {
    color: var(--accent);
    text-decoration: none;
    font-size: 12.5px;
    display: inline-block;
    margin-top: 6px;
  }
  .story a.src:hover { text-decoration: underline; }
  .relevance {
    margin-top: 10px;
    padding-top: 9px;
    border-top: 1px dashed var(--border);
  }
  .rel-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
    display: block;
    margin-bottom: 7px;
  }
  .rel-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    margin-bottom: 5px;
  }
  .rel-item:last-child { margin-bottom: 0; }
  .rel-chip {
    flex-shrink: 0;
    background: rgba(245, 158, 11, 0.16);
    color: var(--accent);
    padding: 1.5px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    line-height: 1.5;
  }
  .rel-note {
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.4;
  }
  .share-btn {
    flex-shrink: 0;
    background: var(--surface-2);
    color: var(--text);
    border: none;
    border-radius: 8px;
    width: 34px;
    height: 34px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.15s;
  }
  .share-btn:hover, .share-btn:active { background: var(--accent); color: #0f172a; }
  .archive-section h2 {
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .archive-list {
    list-style: none;
  }
  .archive-list li {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .archive-list li:hover { border-color: var(--accent); }
  .archive-list a {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    color: var(--text);
    text-decoration: none;
    font-size: 14.5px;
  }
  .archive-list .arrow { color: var(--muted); font-size: 14px; }
  .empty {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 20px;
  }
  .loading {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 30px;
  }
  footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0f172a;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #b45309;
      --accent-glow: rgba(180, 83, 9, 0.15);
      --border: #e2e8f0;
      --today-bg: #fffbeb;
      --today-border: #b45309;
    }
    .story p { color: #475569; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Morning Brief</div>
    <h1>Levant &amp; Gulf</h1>
    <div class="meta">Syria · Iraq · Kuwait · Updated weekday mornings at 8 AM</div>
  </header>

  <div class="today-card" id="today-card">
    <span class="today-badge">Today</span>
    <h2 id="today-title">Loading latest brief...</h2>
    <div class="day-meta" id="today-day"></div>
    <a class="open-link" id="today-open" href="#">Open full page &rarr;</a>
    <div class="today-content" id="today-content">
      <div class="loading">Fetching today's stories...</div>
    </div>
  </div>

  <div class="archive-section">
    <h2>Archive</h2>
    <ul class="archive-list" id="archive-list">
      <li class="loading">Loading past briefs...</li>
    </ul>
  </div>

  <footer>
    Built for Jimmy. Data refreshes weekday mornings.
  </footer>
</div>

<div class="toast" id="toast">Link copied</div>

<script>
const REPO = 'jgemayel/levant-gulf-brief';
const PAGES_BASE = 'https://jgemayel.github.io/levant-gulf-brief';

const toast = document.getElementById('toast');
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function formatDateLong(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

async function loadBriefs() {
  const archiveList = document.getElementById('archive-list');
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/briefs`);
    if (!res.ok) throw new Error('GitHub API ' + res.status);
    const files = await res.json();
    const briefs = files
      .filter(f => /^\d{4}-\d{2}-\d{2}\.html$/.test(f.name))
      .map(f => ({ date: f.name.replace('.html', ''), path: 'briefs/' + f.name }))
      .sort((a, b) => b.date.localeCompare(a.date));

    if (briefs.length === 0) {
      document.getElementById('today-content').innerHTML = '<div class="empty">No briefs yet. The first will arrive tomorrow morning.</div>';
      archiveList.innerHTML = '<li class="empty">No archive yet.</li>';
      return;
    }

    const today = briefs[0];
    document.getElementById('today-title').textContent = formatDateLong(today.date);
    document.getElementById('today-day').textContent = 'Latest brief';
    document.getElementById('today-open').href = today.path;

    // Load today's content inline
    const briefRes = await fetch(today.path);
    const html = await briefRes.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const briefStartComment = findCommentNode(doc.body, 'BRIEF_START');
    const briefEndComment = findCommentNode(doc.body, 'BRIEF_END');
    const container = document.getElementById('today-content');
    container.innerHTML = '';
    if (briefStartComment && briefEndComment) {
      let node = briefStartComment.nextSibling;
      while (node && node !== briefEndComment) {
        if (node.nodeType === 1) {
          // Convert h2 to h3, story h3 to h4 to fit dashboard hierarchy
          const clone = node.cloneNode(true);
          clone.querySelectorAll('h2').forEach(h => {
            const newH = document.createElement('h3');
            newH.innerHTML = h.innerHTML;
            h.replaceWith(newH);
          });
          if (clone.tagName === 'SECTION') clone.classList.add('country');
          clone.querySelectorAll('.story h3').forEach(h => {
            const newH = document.createElement('h4');
            newH.innerHTML = h.innerHTML;
            h.replaceWith(newH);
          });
          // Update share buttons to use full brief URL
          clone.querySelectorAll('[data-share]').forEach(btn => {
            btn.dataset.briefPath = today.path;
          });
          container.appendChild(clone);
        }
        node = node.nextSibling;
      }
      attachShareHandlers(container, today.path);
    } else {
      container.innerHTML = '<div class="empty"><a href="' + today.path + '" style="color:var(--accent)">Open today\'s brief</a></div>';
    }

    // Archive list (everything except today)
    archiveList.innerHTML = '';
    if (briefs.length === 1) {
      archiveList.innerHTML = '<li class="empty">Past briefs will appear here.</li>';
    } else {
      briefs.slice(1).forEach(b => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${b.path}"><span>${formatDateLong(b.date)}</span><span class="arrow">&rarr;</span></a>`;
        archiveList.appendChild(li);
      });
    }
  } catch (err) {
    document.getElementById('today-content').innerHTML = `<div class="empty">Could not load briefs: ${err.message}</div>`;
    archiveList.innerHTML = '';
  }
}

function findCommentNode(root, marker) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_COMMENT, null);
  let n;
  while ((n = walker.nextNode())) {
    if (n.nodeValue && n.nodeValue.includes(marker)) return n;
  }
  return null;
}

function attachShareHandlers(scope, briefPath) {
  scope.querySelectorAll('[data-share]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const story = e.target.closest('.story');
      const id = story.id;
      const headline = story.querySelector('h4, h3').innerText;
      const summary = story.querySelector('p').innerText;
      const src = story.querySelector('a.src');
      const sourceName = src ? src.innerText : '';
      const url = `${PAGES_BASE}/${briefPath}#${id}`;
      const text = headline + '\n\n' + summary + (sourceName ? ('\n\nSource: ' + sourceName) : '') + '\n\n' + url;
      const data = { title: headline, text: text, url: url };
      if (navigator.share) {
        try { await navigator.share(data); } catch(err) {}
      } else if (navigator.clipboard) {
        try { await navigator.clipboard.writeText(text); showToast('Copied to clipboard'); } catch(err) { showToast('Copy failed'); }
      } else {
        prompt('Copy this:', text);
      }
    });
  });
}

loadBriefs();
</script>
</body>
</html>
